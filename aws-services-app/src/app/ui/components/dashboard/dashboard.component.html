<div class="container mt-4">
  @for (category of (categories | async); track category.name) {
    <div class="row">

      <div class="col-12">
          <h2 class="category-header">
              {{ category.name }}
              <span class="badge bg-gray-500 text-white dark:bg-gray-800 dark:text-gray-900 ms-2 px-2 py-1 rounded text-sm font-medium">
                {{ category.services.length }}
              </span>
          </h2>
      </div>

      @for (service of category.services; track service) {
        <app-aws-service-card
          [service]="service"
          [highscore]="getHighscore(service)"
          (serviceClick)="navigateToService($event)">
        </app-aws-service-card>
      }
    </div>
  } @empty {
    <div class="empty-state text-center mt-5 mb-5">
      <div class="empty-icon mb-4">
        <i class="bi bi-search" style="font-size: 3rem; color: #cbd5e0;"></i>
      </div>
      <h3 class="text-gray-600 dark:text-gray-400 mb-4">No cards matching your search</h3>
      <p class="text-gray-500">Try adjusting your filters or search terms.</p>
    </div>
  }
</div>
