<div class="container mt-4">
  @for (category of (categories | async); track category.name) {
    <div class="row">

      <div class="col-12 flex">
          <button class="category-header-container grow mb-3" (click)="toggleCategory(category.name)">
              <h2 class="category-header">
                  {{ category.name }}
              </h2>
              <div class="d-flex align-items-center gap-2 mb-2">
                  <span class="badge bg-gray-500 text-white dark:bg-gray-800 dark:text-gray-900 px-2 py-1 rounded text-sm font-medium">
                    {{ category.services.length }}
                  </span>
                  <span class="btn btn-sm text-[var(--text-primary)] w-8 d-flex align-items-center justify-content-center"
                          [title]="isCollapsed(category.name) ? 'Expand' : 'Collapse'"
                  >
                      @if (isCollapsed(category.name)) {
                          <i class="fas fa-chevron-right"></i>
                      } @else {
                          <i class="fas fa-chevron-down"></i>
                      }
                  </span>
              </div>
          </button>
      </div>

      <div class="col-12 cards-container" [@collapseExpand]="isCollapsed(category.name) ? 'collapsed' : 'expanded'">
        <div class="row">
          @for (service of category.services; track service) {
            <app-aws-service-card
              [service]="service"
              [highscore]="getHighscore(service)"
              (serviceClick)="navigateToService($event)">
            </app-aws-service-card>
          }
        </div>
      </div>
    </div>
  } @empty {
    <div class="empty-state text-center mt-5 mb-5">
      <div class="empty-icon-container mb-4">
        <svg class="empty-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="80" stroke="currentColor" stroke-width="4" stroke-dasharray="10 10" class="circle-dashed" />
          <circle cx="90" cy="90" r="40" stroke="currentColor" stroke-width="6" />
          <path d="M120 120L160 160" stroke="currentColor" stroke-width="12" stroke-linecap="round" />
          <path d="M80 80L100 100M100 80L80 100" stroke="currentColor" stroke-width="4" stroke-linecap="round" />
        </svg>
      </div>
      <h3 class="text-gray-600 dark:text-gray-400 mb-4">No matching cards found</h3>
      <p class="text-gray-500">Try adjusting your filters or search terms.</p>
    </div>
  }
</div>
