<div class="container mt-4">
  @for (category of categories; track category) {
    <div class="row">
      <div class="col-12">
          <h2 class="category-header">
              {{ category.name }}
              <span class="badge bg-gray-500 text-white dark:bg-gray-800 dark:text-gray-900 ms-2 px-2 py-1 rounded text-sm font-medium">
                {{ category.services.length }}
              </span>
          </h2>
      </div>
      @for (service of category.services; track service) {
        <div class="col-lg-3 col-md-4 col-sm-6 col-12 mb-4"
          >
          <div class="card aws-card h-100" (click)="navigateToService(service.id)">
            <div class="card-body">
              <div class="service-icon">
                <i [class]="service.icon"></i>
              </div>
              <h5 class="service-title">{{ service.name }}</h5>
              <p class="service-description">{{ service.description }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
