<div class="mt-3 flex flex-col gap-2">
  @if (gamification.isProgressEnabled()) {
    <app-highscore-bar
      data-test-id="progress-bar"
      label="Progress"
      [value]="progressValue()"
      fromClass="from-[#fb923c]"
      toClass="to-[#f7b139]"
    />
  }
  @if (gamification.isAccuracyEnabled()) {
    <app-highscore-bar
      data-test-id="accuracy-bar"
      label="Accuracy"
      [value]="accuracyValue()"
      fromClass="from-[#3b82f6]"
      toClass="to-[#22d3ee]"
    />
  }
</div>
