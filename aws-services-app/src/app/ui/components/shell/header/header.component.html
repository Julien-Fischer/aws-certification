<div class="aws-header ">
    <div class="container flex">

        <div (click)="goBack()" class="flex align-items-center cursor-pointer">
            <div class="flex align-items-center">
                <h2>
                    <i [class]="logo + ' text-3xl app-logo'"></i>
                </h2>
                <h1 class="hidden lg:block">
                    <span class="text-md font-bold ml-2">{{appName}}</span>
                </h1>
            </div>
        </div>

        <div class="search-container flex items-center mx-2 flex-grow">
            <div class="search-wrapper w-full max-w-md mx-auto relative">
                <i class="fas fa-search search-icon absolute z-10 left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input #searchInput
                       type="text"
                       [ngModel]="searchTerm()"
                       (ngModelChange)="searchTerm.set($event)"
                       (focus)="onSearchFocus()"
                       (blur)="onSearchBlur()"
                       (keydown)="onKeyDown($event)"
                       placeholder="Search... (ctrl+k)"
                       class="search-input w-full py-2 pl-10 pr-10 rounded-full outline-none transition-all shadow-inner"
                />
                @if (searchTerm()) {
                    <button (click)="clearSearch()" class="clear-button absolute right-3 top-1/2 -translate-y-1/2 border-none bg-transparent cursor-pointer p-0 flex items-center justify-center">
                        <i class="fas fa-times-circle text-gray-400 hover:text-gray-600 transition-colors"></i>
                    </button>
                }

                @if (isSearchFocused() && searchTerm()) {
                    <app-search-autocomplete
                        [results]="filteredResults()"
                        [selectedIndex]="selectedIndex()"
                        (selected)="onCardSelected($event)">
                    </app-search-autocomplete>
                }
            </div>
        </div>

        <div class="flex items-center ml-auto desktop-buttons">
            <button (click)="gamification.toggle()"
                    class="theme-toggle-btn mr-4"
                    [class.active]="gamification.isEnabled()"
                    [title]="gamification.isEnabled() ? 'Disable Gamification' : 'Enable Gamification'">
                <i class="fas fa-gamepad fa-xl w-5 h-5 flex align-items-center justify-center"></i>
            </button>
            <button
                (click)="themeService.toggleTheme()"
                class="theme-toggle-btn theme-btn mr-4"
                [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
            >
                <i class="fa-xl w-5 h-5 flex align-items-center justify-center"
                   [class.fas]="true"
                   [class.fa-sun]="themeService.isDark()"
                   [class.fa-moon]="!themeService.isDark()">
                </i>
            </button>
            <a [href]="repository" title="github link" class="github-link" target="_blank">
                <i class="fab fa-github fa-xl"></i>
            </a>
        </div>

        <div class="flex items-center ml-auto mobile-menu-button">
            <button (click)="isMobileMenuOpen.set(true)" class="waffle-btn theme-toggle-btn">
                <div class="waffle-icon">
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                    <span></span><span></span><span></span>
                </div>
            </button>
        </div>

    </div>
</div>

@if (isSearchFocused() && searchTerm()) {
    <div class="search-backdrop" (click)="clearSearch()"></div>
}

@if (isMobileMenuOpen()) {
    <div class="mobile-menu-overlay" (click)="isMobileMenuOpen.set(false)">
        <div class="mobile-menu-content" (click)="$event.stopPropagation()">
            <div class="mobile-menu-header">
                <div class="flex justify-content-between align-items-center w-full px-3 py-3">
                    <div (click)="goBack(); isMobileMenuOpen.set(false)" class="flex align-items-center cursor-pointer">
                        <i [class]="logo + ' text-2xl app-logo'"></i>
                    </div>

                    <div class="flex items-center gap-4">
                        <button (click)="gamification.toggle()"
                                class="theme-toggle-btn"
                                [class.active]="gamification.isEnabled()"
                                [title]="gamification.isEnabled() ? 'Disable Gamification' : 'Enable Gamification'">
                            <i class="fas fa-gamepad fa-xl w-5 h-5 flex align-items-center justify-center"></i>
                        </button>
                        <button
                            (click)="themeService.toggleTheme()"
                            class="theme-toggle-btn"
                            [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
                        >
                            <i class="fa-xl w-5 h-5 flex align-items-center justify-center"
                               [class.fas]="true"
                               [class.fa-sun]="themeService.isDark()"
                               [class.fa-moon]="!themeService.isDark()">
                            </i>
                        </button>
                        <a [href]="repository" title="github link" class="github-link-mobile" target="_blank">
                            <i class="fab fa-github fa-xl"></i>
                        </a>
                    </div>

                    <button (click)="isMobileMenuOpen.set(false)" class="close-btn theme-toggle-btn">
                        <i class="fas fa-times fa-xl"></i>
                    </button>
                </div>
            </div>
            <div class="mobile-menu-body">
                <div class="menu-grid">
                    @for (card of allMetadata(); track card.id) {
                        <div class="menu-item" (click)="onCardSelected(card.id)">
                            <i [class]="card.icon + ' menu-item-icon'"></i>
                            <span class="menu-item-name">{{card.name}}</span>
                        </div>
                    }
                </div>
            </div>
        </div>
    </div>
}
