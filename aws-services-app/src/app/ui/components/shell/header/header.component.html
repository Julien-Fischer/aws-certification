<div class="aws-header ">
    <div class="container flex">

        <div (click)="goBack()" class="flex align-items-center cursor-pointer">
            <!--        THE AWS LOGO   -->
            <div class="flex align-items-center">
                <h1 class="mb-0 text-xl">
                    <i class="fab fa-aws fa-xl me-3"></i>
                </h1>
            </div>

            <div class="flex items-center space-x-4">
                <div>
                    <h1 class="text-md font-bold ">{{appName}}</h1>
                </div>
            </div>
        </div>

        <div class="flex items-center ml-auto">
            <button (click)="gamification.toggle()"
                    class="theme-toggle-btn mr-4"
                    [class.active]="gamification.isEnabled()"
                    [title]="gamification.isEnabled() ? 'Disable Gamification' : 'Enable Gamification'">
                <i class="fas fa-gamepad fa-xl w-5 h-5 flex align-items-center justify-center"></i>
            </button>
            <button (click)="themeService.toggleTheme()" class="theme-toggle-btn mr-4" [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
                <i class="fa-xl w-5 h-5 flex align-items-center justify-center"
                   [class.fas]="true"
                   [class.fa-sun]="themeService.isDark()"
                   [class.fa-moon]="!themeService.isDark()">
                </i>
            </button>
                <a href="https://github.com/ymougenel/aws-certification" alt="lien github">
                    <i class="fab fa-github fa-xl"></i>
                </a>
        </div>
    </div>
</div>
