<div class="aws-header ">
    <div class="container flex">

        <div (click)="goBack()" class="flex align-items-center cursor-pointer">
            <div class="flex align-items-center">
                <h2>
                    <i [class]="logo + ' text-3xl'"></i>
                </h2>
                <h1 class="hidden md:block">
                    <span class="text-md font-bold ml-2">{{appName}}</span>
                </h1>
            </div>
        </div>

        <div class="search-container flex items-center mx-4 flex-grow">
            <div class="search-wrapper w-full max-w-md mx-auto relative">
                <i class="fas fa-search search-icon absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input #searchInput
                       type="text"
                       [ngModel]="searchTerm()"
                       (ngModelChange)="searchTerm.set($event)"
                       placeholder="Search... (ctrl+k)"
                       class="search-input w-full py-2 pl-10 pr-10 rounded-full border-none focus:outline-none transition-all shadow-inner"
                />
                @if (searchTerm()) {
                    <button (click)="clearSearch()" class="clear-button absolute right-3 top-1/2 -translate-y-1/2 border-none bg-transparent cursor-pointer p-0 flex items-center justify-center">
                        <i class="fas fa-times-circle text-gray-400 hover:text-gray-600 transition-colors"></i>
                    </button>
                }
            </div>
        </div>

        <div class="flex items-center ml-auto">
            <button (click)="gamification.toggle()"
                    class="theme-toggle-btn mr-4"
                    [class.active]="gamification.isEnabled()"
                    [title]="gamification.isEnabled() ? 'Disable Gamification' : 'Enable Gamification'">
                <i class="fas fa-gamepad fa-xl w-5 h-5 flex align-items-center justify-center"></i>
            </button>
            <button (click)="themeService.toggleTheme()" class="theme-toggle-btn mr-4" [title]="themeService.isDark() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
                <i class="fa-xl w-5 h-5 flex align-items-center justify-center"
                   [class.fas]="true"
                   [class.fa-sun]="themeService.isDark()"
                   [class.fa-moon]="!themeService.isDark()">
                </i>
            </button>
            <a [href]="repository" title="lien github">
                <i class="fab fa-github fa-xl"></i>
            </a>
        </div>

    </div>
</div>
