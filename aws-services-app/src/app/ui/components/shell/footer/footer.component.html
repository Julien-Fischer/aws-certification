<footer id="footer-component"
        class="bg-gray-50 dark:bg-slate-900 border-t border-gray-200 dark:border-slate-800 mt-auto transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex justify-between items-center">
            <div id="licence" class="flex items-center space-x-2">
                <span class="text-sm text-gray-600 dark:text-slate-400 font-medium"><a
                        href="https://github.com/ymougenel/aws-certification/blob/main/LICENSE">MIT License</a></span>
            </div>
            <div class="text-center"><p class="text-sm text-gray-600 dark:text-slate-400">Made in <span
                    class="font-semibold">{{ current_date | date:'yyyy' }}</span> by
                @for (author of authors; track author) {
                    <a
                            [href]="author.url"
                            class="underline hover:no-underline font-semibold text-blue-600 dark:text-sky-400"
                            target="_blank"
                    >{{ author.name }}</a>
                    @if ($index < authors.length - 2) {
                        <span>, </span>
                    }
                    @else if ($index < authors.length - 1) {
                        <span> and </span>
                    }
                }
                , with <span class="text-red-500">❤️</span>
                and <span class="font-semibold text-purple-600 dark:text-purple-400">AI</span></p></div>
            <div>
                <!--                <button class="text-sm font-medium text-blue-600 hover:text-blue-800 transition-colors duration-200">-->
                <!--                    About Project-->
                <!--                </button>-->
            </div>
        </div>
    </div>
</footer>
